# PQC Messenger — Cloud Build CI/CD Configuration
# Purpose: Automated build and deploy to Google Cloud Run.
# Created by: TASK-31 (Phase 7)
#
# Usage: gcloud builds submit --config=cloudbuild.yaml .
# Or connect to GitHub for automatic builds on push.

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/pqc-messenger-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/pqc-messenger-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/pqc-messenger-backend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/pqc-messenger-backend:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pqc-messenger-backend'
      - '--image=gcr.io/$PROJECT_ID/pqc-messenger-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--timeout=300'
      - '--session-affinity'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,STORAGE_BACKEND=firestore,USE_FIREBASE_AUTH=true,ENABLE_AUDIT_LOGGING=true,ENABLE_KMS=false,GCS_BUCKET_NAME=pqsm-18197-encrypted-data,ALLOWED_ORIGINS=*'

images:
  - 'gcr.io/$PROJECT_ID/pqc-messenger-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/pqc-messenger-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
